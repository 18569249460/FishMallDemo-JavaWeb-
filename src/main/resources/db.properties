jdbc.driver=com.mysql.cj.jdbc.Driver
# MySQL JDBC URL. Default database: local fish_shop_db.
jdbc.url=jdbc:mysql://localhost:3306/fish_shop_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
# Database username/password for local development. Do not commit production secrets.
jdbc.username=root
jdbc.password=123456

# Druid connection pool settings.
druid.initialSize=3
druid.minIdle=3
druid.maxActive=20
druid.maxWait=60000

# JWT settings. secret is used for signing, expirationMillis is token lifetime.
jwt.secret=fishMallJwtSecretKeyForHs256MustBeAtLeast32Bytes
jwt.expirationMillis=86400000
